site_name: Geospatial Agentic Services
site_description: Documentation for the Geospatial Agentic Services framework and reference implementation.
site_url: https://GIBD2015.github.io/geospatial-agentic-services/
repo_url: https://github.com/GIBD2015/geospatial-agentic-services
repo_name: GIBD2015/geospatial-agentic-services

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/gas-logo.png
  favicon: assets/gas-logo.png
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - User Guides:
      - Use GAS Services: gas_client_sdk.md
      - Use GAS Canvas: gas_canvas.md
      - GAS Registry: gas_registry.md
      - Notebook Examples: examples.md
  - Developer Guides:
      - GAS Interfaces: gas_interfaces.md
      - Add an Agent Service: adding_an_agent_service.md
      - Server Architecture: gas_server_architecture.md
      - Included Agents: included_agents.md
      - GAS Canvas Development: gas_canvas_development.md
      - Improve the Codebase: contributing.md
  - Deployment & Operations:
      - Host a GAS Server: development_and_deployment_environment.md
      - Security: security.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

extra:
  gibd_lab_url: https://giscience.psu.edu/
  gibd_lab_name: GIBD Lab
