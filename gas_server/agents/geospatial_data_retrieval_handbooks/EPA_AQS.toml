# Python code example for the data source.
code_example = '''
import requests
import pandas as pd

def download_data():
    # EPA AQS API credentials
    email = "your_email@example.com"
    key = "your_api_key"

    # --- Endpoint configuration ---
    # Geographic level options: dailyData/byState, dailyData/byCounty, dailyData/bySite, etc.
    # Annual summary:           annualData/byState, annualData/byCounty, etc.
    base_url = "https://aqs.epa.gov/data/api/dailyData/byState" #To download data for all counties in a state, always use byState, it returns all counties in a state. ByCounty returns data for one county at a time.

    params = {
        "email": email,
        "key": key,
        "param": "88101",       # PM2.5 FRM/FEM
        "bdate": "20230101",    # Start date: YYYYMMDD
        "edate": "20231231",    # End date: YYYYMMDD (max 366 days per request)
        "state": "42",          # Pennsylvania FIPS
    }

    # --- Download ---
    response = requests.get(base_url, params=params)
    response.raise_for_status()
    data = response.json()

    # Check API-level status
    header = data.get("Header", [{}])[0]
    assert header.get("status") == "Success", f"API error: {header.get('error')}"

    # --- Load into DataFrame ---
    df = pd.DataFrame(data["Data"])
    print(f"Records returned: {len(df)}")

    # --- Basic cleaning ---
    df["date_local"] = pd.to_datetime(df["date_local"])
    df = df[df["validity_indicator"] == "Y"]   # Keep only valid observations
    df["arithmetic_mean"] = pd.to_numeric(df["arithmetic_mean"], errors="coerce")

    # --- Save ---
    output_file = "pa_pm25_daily_2023.csv"
    df.to_csv(output_file, index=False)
    print(f"Saved {len(df)} rows to {output_file}")

download_data()
'''
