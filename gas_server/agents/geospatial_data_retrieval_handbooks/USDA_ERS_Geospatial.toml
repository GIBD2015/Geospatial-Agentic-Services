code_example = '''
import requests
import pandas as pd

def download_data():
    base_url = "https://gisportal.ers.usda.gov/server/rest/services/Rural_Atlas_Data/County_Classifications/MapServer"
    layer_id = 0
    query_url = f"{base_url}/{layer_id}/query"

    # --- Step 1: Always fetch layer metadata first to get exact field names ---
    layer_meta = requests.get(f"{base_url}/{layer_id}", params={"f": "json"})
    layer_meta.raise_for_status()
    fields = [f["name"] for f in layer_meta.json().get("fields", [])]
    print("Available fields:", fields)

    # --- Step 2: Get total record count ---
    count_resp = requests.get(query_url, params={
        "where": "1=1", "returnCountOnly": "true", "f": "json"
    })
    count_resp.raise_for_status()
    total_count = count_resp.json()["count"]
    print(f"Total records: {total_count}")

    # --- Step 3: Paginate and extract attributes directly (NOT pd.json_normalize) ---
    all_records = []
    for offset in range(0, total_count, 1000):
        resp = requests.get(query_url, params={
            "where"            : "1=1",
            "outFields"        : "*",
            "f"                : "json",
            "returnGeometry"   : "false",
            "resultOffset"     : offset,
            "resultRecordCount": 1000,
        })
        resp.raise_for_status()
        data = resp.json()
        # Extract attributes directly — clean column names with no 'attributes.' prefix
        all_records.extend([feat["attributes"] for feat in data.get("features", [])])
        print(f"Fetched {len(all_records)} / {total_count} records")

    df = pd.DataFrame(all_records)

    # --- Step 4: Filter by state using FIPSTXT (already zero-padded string) ---
    # California FIPS prefix = '06'; always use FIPSTXT not FIPSNUM for string filtering
    california_df = df[df["FIPSTXT"].str.startswith("06")].copy()
    print(f"California counties: {len(california_df)}")

    # --- Step 5: Save ---
    output_file = "California_Rural_Urban_Continuum.csv"
    california_df.to_csv(output_file, index=False)
    print(f"Saved to {output_file}")

download_data()
'''