handbook = '''
No API key is required. All services are freely and publicly accessible via HTTPS only (HTTP will fail).
The ArcGIS REST services directory root is: https://gisportal.ers.usda.gov/server/rest/services/
Each map service exposes one or more layers. To list layers in a service, append ?f=json to the MapServer URL.
To query a layer for tabular attribute data, use the query endpoint: {MapServer_URL}/{layerID}/query
The standard query parameters are: where (SQL filter, use '1=1' for all records), outFields (comma-separated field names, or '*' for all), f=json, returnGeometry=false (set true only if you need geometries), outSR=4326 (output spatial reference; use 4326 for WGS84).
ALWAYS fetch the layer metadata first at {MapServer_URL}/{layerID}?f=json to get exact field names before writing any query or filter — never assume field names.
The County Classifications layer uses 'FIPSTXT' (string with leading zeros, e.g. '06001') and 'FIPSNUM' (integer) as the FIPS identifier fields — NOT 'FIPS', 'GEOID', or 'COUNTYFIPS'. Always read actual field names from layer metadata.
Always extract features using [feat["attributes"] for feat in data["features"]] — do NOT use pd.json_normalize() on the full feature object as it adds an 'attributes.' prefix to all column names, causing KeyErrors on filtering.
The API returns a maximum of 1000 records per request. Always check total record count first using returnCountOnly=true, then paginate using resultOffset and resultRecordCount.
Always check the 'exceededTransferLimit' key in the JSON response — if true, continue paginating with resultOffset.
Use requests.get() with a params dict — never build URLs manually with string concatenation.
Always verify the FIPS field is a string with leading zeros before filtering (e.g., use str.zfill(5) on integer FIPS columns). FIPSTXT is already a correctly zero-padded string.
Save tabular results as CSV using pandas. If geometry is requested, save as GeoJSON or GeoPackage using geopandas.
The spatial reference of most services is WGS84 (EPSG:4326) or NAD83; always reproject to EPSG:4326 for output.
