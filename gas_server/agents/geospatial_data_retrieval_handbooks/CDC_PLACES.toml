code_example = '''
import requests
import pandas as pd

def download_data():
    BASE_URL = "https://data.cdc.gov/resource"

    # Dataset ID lookup:
    # County:  2025 release (BRFSS 2023) = 'swc5-untb'
    #          2023 release (BRFSS 2021) = 'h3ej-a9ec'
    #          2022 release (BRFSS 2020) = 'duw2-7jbt'
    #          2021 release (BRFSS 2019) = 'pqpp-u99h'
    # Tract:   2025 release (BRFSS 2023) = 'cwsq-ngmh'
    #          2023 release (BRFSS 2021) = 'em5e-5hvn'
    # Place:   2025 release (BRFSS 2023) = 'eav7-hnsx'
    #          2023 release = 'krqc-563j'

    DATASET_ID = "swc5-untb"  # County level, latest release

    params = {
       "$select": "year, stateabbr, locationname, locationid, data_value, data_value_type, measureid",
        "$where": (
            "measureid = 'OBESITY' "
            "AND data_value_type = 'Crude prevalence' "
            "AND stateabbr = 'AL'"
        ),
        "$order": "year DESC",
        "$limit": 50000
    }

    url = f"{BASE_URL}/{DATASET_ID}.json"

    response = requests.get(url, params=params)
    response.raise_for_status()

    df = pd.DataFrame(response.json())
    df["data_value"] = pd.to_numeric(df["data_value"], errors="coerce")

    output_file = "cdc_places_obesity_AL.csv"
    df.to_csv(output_file, index=False)
    print(f"Saved {len(df)} rows to {output_file}")

download_data()
'''